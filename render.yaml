# NOTE: the "free" database plan below is deleted permanently 30 days after
# creation (with a 14-day grace period to upgrade first). See README.md.
# Change "plan: free" to a paid plan (e.g. "basic-256mb") before this
# becomes a real team tool you depend on.
databases:
  - name: prolato-outreach-db
    plan: free

services:
  - type: web
    name: prolato-outreach-pipeline
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: prolato-outreach-db
          property: connectionString
